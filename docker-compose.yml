services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: trialnexus-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - reindex.remote.whitelist=*.elastic.cloud:443,*.elastic.cloud:9243,*.es.amazonaws.com:443
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 90s

  backend:
    build:
      context: .
      dockerfile: clinical-crm/Dockerfile
    container_name: trialnexus-backend
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "8001:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ELASTIC_URL=${ELASTIC_URL}
      - ELASTIC_API_KEY=${ELASTIC_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - FEATHERLESS_API_KEY=${FEATHERLESS_API_KEY}
    restart: unless-stopped

  frontend:
    build:
      context: ./control-tower
      args:
        - VITE_API_URL=/api
    container_name: trialnexus-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  es_data:
