services:
  backend:
    build:
      context: ./clinical-crm
    container_name: trialnexus-backend
    ports:
      - "8001:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ELASTIC_URL=${ELASTIC_URL}
      - ELASTIC_API_KEY=${ELASTIC_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - FEATHERLESS_API_KEY=${FEATHERLESS_API_KEY}
    restart: unless-stopped

  frontend:
    build:
      context: ./control-tower
    container_name: trialnexus-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
